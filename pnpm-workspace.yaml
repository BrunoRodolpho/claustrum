packages:
  - "packages/*"
  - "examples/*"
  - "apps/*"
  # Sibling adjudicate repo — the kernel. Linked so @adjudicate/* resolves to the
  # live working tree (kernel fixes compose into the runtime) instead of a frozen
  # snapshot. Post-publish this reverts to the registry ^1.1.0 ranges.
  - "../adjudicate/packages/*"
