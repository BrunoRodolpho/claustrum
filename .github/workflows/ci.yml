name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (workspace packages — types needed for typecheck/test)
        run: pnpm build

      - name: Lint (typecheck)
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Dependency advisory audit (high+)
        run: pnpm audit --prod --audit-level high
        continue-on-error: true
