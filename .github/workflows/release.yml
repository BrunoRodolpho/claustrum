name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version PR or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm publish -r --access public --provenance
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # setup-node (registry-url) writes a temp .npmrc and points
          # NPM_CONFIG_USERCONFIG at it with `_authToken=${NODE_AUTH_TOKEN}`.
          # pnpm reads THAT file, so the real token must arrive via
          # NODE_AUTH_TOKEN — without it the setup-node placeholder is sent and
          # npm rejects the publish with E404. (Same fix as adjudicate.)
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
